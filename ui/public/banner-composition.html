<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomo Lens Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            /* A subtle off-white transparent-like background like the image */
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .composition-wrapper {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 40px;
            /* Optional: subtle glass background to make it export nicely */
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(8px);
        }

        .logo-img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            /* Give it a subtle drop shadow to match the realistic vibe */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .brand-text-container {
            display: flex;
            align-items: center;
            font-size: 80px;
            line-height: 1;
        }

        .text-nomo {
            font-weight: 300;
            color: white;
            /* Simulating the outlined text effect from the original image */
            -webkit-text-stroke: 2px #d1d5db; /* Tailwind gray-300 */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            letter-spacing: -1px;
        }

        .text-lens {
            font-weight: 700;
            /* A metallic/glassy gradient fill */
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 35%, #0ea5e9 65%, #0369a1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Inner shadow/bevel simulation */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            margin-left: 8px;
            letter-spacing: -2px;
        }

        .tagline {
            font-family: 'Caveat', cursive;
            font-size: 28px;
            color: #6b7280;
            margin-top: -5px;
            /* Text texture */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .text-content {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <div class="composition-wrapper">
        <!-- New Logo -->
        <img src="logo.png" alt="Nomo Lens Logo" class="logo-img" />

        <div class="text-content">
            <!-- Brand Name -->
            <div class="brand-text-container">
                <span class="text-nomo">Nomo</span>
                <span class="text-lens">Lens</span>
            </div>
            
            <!-- Tagline -->
            <div class="tagline">
                Your ideas deserve the perfect name. Let's find it together.
            </div>
        </div>
    </div>

</body>
</html>
